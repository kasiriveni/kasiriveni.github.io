<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta http-equiv="X-UA-Compatible" content="ie=edge" />

	<!-- SEO Meta Tags -->
	<meta name="description" content="Srinivas Kasiriveni's personal portfolio showcasing projects, skills, and experience." />
	<meta name="keywords" content="Srinivas Kasiriveni, Portfolio, Web Developer, Projects, Skills, Experience" />
	<meta name="author" content="Srinivas Kasiriveni" />

	<!-- Open Graph Meta Tags -->
	<meta property="og:title" content="Srinivas Kasiriveni | Personal Portfolio" />
	<meta property="og:description" content="Explore Srinivas Kasiriveni's portfolio to learn about his projects, skills, and experience." />
	<meta property="og:image" content="https://example.com/portfolio-image.jpg" /> <!-- Replace with actual image URL -->
	<meta property="og:url" content="https://example.com" /> <!-- Replace with actual URL -->
	<meta property="og:type" content="website" />

	<!-- Twitter Card Meta Tags -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="Srinivas Kasiriveni | Personal Portfolio" />
	<meta name="twitter:description" content="Explore Srinivas Kasiriveni's portfolio to learn about his projects, skills, and experience." />
	<meta name="twitter:image" content="https://example.com/portfolio-image.jpg" /> <!-- Replace with actual image URL -->

	<!-- Favicon -->
	<link rel="icon" href="/favicon.ico" /> <!-- Replace with actual favicon path -->

	<!-- Structured Data -->
	<script type="application/ld+json">
	{
		"@context": "https://schema.org",
		"@type": "Person",
		"name": "Srinivas Kasiriveni",
		"url": "https://example.com", <!-- Replace with actual URL -->
		"sameAs": [
			"https://www.linkedin.com/in/srinivaskasiriveni", <!-- Replace with actual LinkedIn URL -->
			"https://github.com/kasiriveni" <!-- Replace with actual GitHub URL -->
		],
		"jobTitle": "Web Developer",
		"worksFor": {
			"@type": "Organization",
			"name": "Your Company Name" <!-- Replace with actual company name -->
		},
		"image": "https://example.com/portfolio-image.jpg" <!-- Replace with actual image URL -->
	}
	</script>

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="preload" as="style"
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" />
	<link
		href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet" />
	<title>Srinivas Kasiriveni | Personal Portfolio</title>
</head>

<body>
	<div id="root"></div>
	<script src="./bundle.js"></script>
</body>

</html>
