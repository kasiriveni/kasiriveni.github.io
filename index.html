<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />

		<!-- SEO Meta Tags -->
		<meta
			name="description"
			content="Srinivas Kasiriveni's personal portfolio showcasing projects, skills, and experience."
		/>
		<meta
			name="keywords"
			content="Srinivas Kasiriveni, Portfolio, Web Developer, Projects, Skills, Experience"
		/>
		<meta name="author" content="Srinivas Kasiriveni" />

		<!-- Performance: preconnect to image/icon CDNs for faster LCP/CLS -->
		<link rel="preconnect" href="https://avatars.githubusercontent.com" crossorigin />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

		<!-- Open Graph Meta Tags -->
		<meta property="og:title" content="Srinivas Kasiriveni | Personal Portfolio" />
		<meta
			property="og:description"
			content="Explore Srinivas Kasiriveni's portfolio to learn about his projects, skills, and experience."
		/>
		<meta property="og:image" content="https://avatars.githubusercontent.com/u/10164017?v=4" />
		<meta property="og:url" content="https://kasiriveni.github.io" />
		<!-- Replace with actual URL -->
		<meta property="og:type" content="website" />

		<!-- Twitter Card Meta Tags -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Srinivas Kasiriveni | Personal Portfolio" />
		<meta
			name="twitter:description"
			content="Explore Srinivas Kasiriveni's portfolio to learn about his projects, skills, and experience."
		/>
		<meta name="twitter:image" content="https://avatars.githubusercontent.com/u/10164017?v=4" />

		<!-- Favicon -->
		<link rel="icon" href="/favicon.ico" />

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Srinivas Kasiriveni",
				"url": "https://kasiriveni.github.io",
				"sameAs": [
					"https://www.linkedin.com/in/srinivaskasiriveni",
					"https://github.com/kasiriveni"
				],
				"jobTitle": "Web Developer",
				"image": "https://avatars.githubusercontent.com/u/10164017?v=4"
			}
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
			rel="stylesheet"
		/>
		<title>Srinivas Kasiriveni | Personal Portfolio</title>
	</head>

	<body>
		<div id="root"></div>
		<script src="./bundle.js"></script>
	</body>
</html>
